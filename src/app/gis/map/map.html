<div class="map-wrapper">

  <!-- Smart Sub-components bound to the Core Data -->
  <app-map-edit-panel 
    (onSave)="saveFeature()" 
    (onCancel)="cancelEdit()">
  </app-map-edit-panel>

  <app-map-popup 
    (onEdit)="openEditFromPopup()">
  </app-map-popup>

  <app-map-toolbar 
    (onToggle3D)="toggle3D()"
    (onUpload)="uploadFile($event)"
    (onAddFeatureLayer)="addFeatureLayer()"
    (onAddKML)="addKMLLayer()">
  </app-map-toolbar>

  <!-- Core Map Rendering Container -->
  <div id="mapViewDiv" class="map-view"></div>

  <!-- Loading Overlay -->
   <app-map-loading></app-map-loading>
</div>
